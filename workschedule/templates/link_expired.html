<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg text-center">

        <div class="mb-4">
            <svg class="mx-auto h-16 w-16 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>

        <h1 class="text-3xl font-bold text-gray-800 mb-2">This link has expired</h1>
        <p class="text-gray-500 mb-8 text-sm">Download links are only valid for 1 hour after payment. This one has expired.</p>

        <a href="/schedule/upload"
            class="inline-block bg-sky-600 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-sky-700 transition-colors duration-300 text-base">
            Start Over &rarr;
        </a>

        <div class="mt-8">
            <a href="/" class="text-sm text-sky-600 hover:underline">&#8592; Back to Home</a>
        </div>
    </div>
</body>
</html>
